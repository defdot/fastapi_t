services:
  traefik:
    image: traefik:v3.3
    restart: always
    command:
      - "--api.insecure=true"                    # 开发环境启用 Dashboard
      - "--providers.file.directory=/etc/traefik"  # 文件配置
      - "--providers.file.watch=true"              # 自动监测配置变化
      - "--entrypoints.web.address=:80"            # HTTP 入口
      - "--entrypoints.websecure.address=:443"     # HTTPS 入口
    ports:
      - "80:80"       # HTTP
      - "443:443"     # HTTPS
      - "8080:8080"   # Traefik Dashboard
    volumes:
      - ./traefik:/etc/traefik
      - ./certs:/certs                         # 本地证书目录（开发环境）
      # 生产环境使用 Let's Encrypt 时挂载此目录:
      # - ./letsencrypt:/letsencrypt

  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER?variable not set}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD?variable not set}
      POSTGRES_DB: ${POSTGRES_DB?variable not set}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 5

  init:
    build: .
    environment:
      POSTGRES_USER: ${POSTGRES_USER?variable not set}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD?variable not set}
      POSTGRES_DB: ${POSTGRES_DB?variable not set}
      POSTGRES_SERVER: db
      POSTGRES_PORT: ${POSTGRES_PORT}
      SECRET_KEY: ${SECRET_KEY}
    depends_on:
      db:
        condition: service_healthy
    command: bash scripts/init_db.sh

  backend:
    build: .
    restart: always
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      POSTGRES_USER: ${POSTGRES_USER?variable not set}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD?variable not set}
      POSTGRES_DB: ${POSTGRES_DB?variable not set}
      POSTGRES_SERVER: db
      POSTGRES_PORT: ${POSTGRES_PORT}
      SECRET_KEY: ${SECRET_KEY}
      LOG_LEVEL: ${LOG_LEVEL}
      WORKERS: ${WORKERS}
    volumes:
      - ./logs:/app/logs
    depends_on:
      init:
        condition: service_completed_successfully
      db:
        condition: service_healthy
        restart: true
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  pgdata:
