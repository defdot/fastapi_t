http:
  routers:
    # HTTP 到 HTTPS 重定向
    fastapi-redirect:
      rule: "PathPrefix(`/`)"
      entryPoints:
        - web
      middlewares:
        - https-redirect
      service: fastapi

    # HTTPS 路由
    fastapi-secure:
      rule: "PathPrefix(`/`)"
      entryPoints:
        - websecure
      service: fastapi
      tls:
        certFile: /certs/tls.crt
        keyFile: /certs/tls.key

  middlewares:
    https-redirect:
      redirectScheme:
        scheme: https
        permanent: true

  services:
    fastapi:
      loadBalancer:
        servers:
          - url: "http://web:8000"

# 本地自签名证书配置（开发环境）
# 生产环境使用 Let's Encrypt 时，参考 HTTPS_SETUP.md 中的说明
